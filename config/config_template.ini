[project]
# Used only for labels in the report. Examples: 5UTR, promoter, barcode.
target_name = my_library

[input]
# Relative paths are resolved from this config file.
input_dir = /path/to/fastq
reference = /path/to/reference.csv
outdir = /path/to/results

# Optional. Leave blank when unavailable.
sample_sheet =
top_unknown =

[reference]
# CSV/TSV column names. FASTA references ignore these two values.
id_column = Variant_ID
sequence_column = target_sequence

# auto: accept target-only sequences or automatically remove primer/flank arms
# target: reference contains target sequence only
# amplicon: reference contains primer-flanked full amplicons
reference_mode = auto

[amplicon]
# Primer sequence as ordered, without 5-prime random stagger bases.
# right_primer is the oligo sequence, not its reverse complement.
left_primer = REPLACE_WITH_FORWARD_PRIMER
right_primer = REPLACE_WITH_REVERSE_PRIMER

[matching]
anchor_mismatches = 1
signature_length = 20
max_mismatches = 2

[index_qc]
max_index_distance = 2

[control_qc]
# PhiX174 is classified directly from R1/R2 with the bundled NC_001422.1
# reference. Set expected_phix_percent only when the wet-lab spike-in is known.
phix_enabled = yes
phix_reference =
expected_phix_percent =
phix_kmer_length = 27
phix_min_kmer_hits = 1

[runtime]
# Leave max_reads blank for the full run. Use 100000 for a quick dry run.
max_reads =
write_observed_sequences = yes
overwrite = no
