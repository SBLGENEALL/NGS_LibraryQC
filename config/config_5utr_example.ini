[project]
target_name = 5UTR

[input]
input_dir = /data/user/MCET03/03_NGS_LibraryQC/fastq
reference = /data/user/MCET03/03_NGS_LibraryQC/design_2000.csv
outdir = /data/user/MCET03/03_NGS_LibraryQC/amplicon_qc_results
sample_sheet = /data/user/MCET03/03_NGS_LibraryQC/SampleSheet.csv
top_unknown = /data/user/MCET03/03_NGS_LibraryQC/Top_Unknown_Barcodes.csv

[reference]
id_column = Variant_ID
sequence_column = UTR_sequence
reference_mode = auto

[amplicon]
left_primer = CTATAAAAGAGCTCACAACCCCTCA
right_primer = GGAGGCCACACCCGCCACTCACCTG

[matching]
anchor_mismatches = 1
signature_length = 20
max_mismatches = 2

[index_qc]
max_index_distance = 2

[control_qc]
phix_enabled = yes
phix_reference =
expected_phix_percent = 10
phix_kmer_length = 27
phix_min_kmer_hits = 1

[runtime]
max_reads =
write_observed_sequences = yes
overwrite = no
